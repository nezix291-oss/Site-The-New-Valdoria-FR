<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The New Valdoria - V2.3</title>
    <style>
        body { background: black; color: white; font-family: Arial, sans-serif; margin: 0; line-height: 1.6; }
        a { color: yellow; text-decoration: none; }
        header { text-align: center; padding: 30px; border-bottom: 2px solid yellow; }
        nav { background: #111; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .nav-btn { background: none; border: 1px solid yellow; color: yellow; padding: 8px 20px; cursor: pointer; margin: 0 5px; border-radius: 5px; font-weight: bold; }
        .nav-btn:hover { background: yellow; color: black; }
        .view { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: #111; padding: 20px; margin: 20px auto; max-width: 800px; border-radius: 10px; border: 1px solid #222; }
        h2 { color: yellow; }
        button { background: yellow; color: black; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; color: white; border: 1px solid yellow; box-sizing: border-box; }
        #wheelContainer { text-align: center; position: relative; margin: 30px auto; width: 320px; }
        #pointer { font-size: 40px; color: yellow; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); z-index: 10; }
        #wheel { width: 300px; height: 300px; border-radius: 50%; border: 8px solid yellow; position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: #333; }
        .slice { position: absolute; width: 100%; height: 100%; left: 0; top: 0; clip-path: polygon(50% 50%, 50% 0%, 100% 20%); transform-origin: 50% 50%; }
        .slice:nth-child(1) { transform: rotate(0deg); background: #e74c3c; } 
        .slice:nth-child(2) { transform: rotate(60deg); background: #2ecc71; } 
        .slice:nth-child(3) { transform: rotate(120deg); background: #e74c3c; } 
        .slice:nth-child(4) { transform: rotate(180deg); background: #2ecc71; } 
        .slice:nth-child(5) { transform: rotate(240deg); background: #e74c3c; } 
        .slice:nth-child(6) { transform: rotate(300deg); background: #e74c3c; } 
        #timer { color: #ffa500; font-weight: bold; margin-top: 10px; }
        #result { font-size: 22px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<nav>
    <button class="nav-btn" onclick="showView('user-view')">🏠 Accueil</button>
    <button class="nav-btn" onclick="checkAdmin()">🛠 Admin</button>
</nav>

<header>
    <h1>🏰 The New Valdoria</h1>
    <p>IP : 151.240.100.21:25582 | Version : 1.21.1</p>
</header>

<div id="user-view" class="view active">
    <section class="card">
        <h2>🎡 Roue de la chance (10% de chance total)</h2>
        <div id="wheelContainer">
            <div id="pointer">▼</div>
            <div id="wheel">
                <div class="slice"></div><div class="slice"></div>
                <div class="slice"></div><div class="slice"></div>
                <div class="slice"></div><div class="slice"></div>
            </div>
        </div>
        <div style="text-align:center">
            <button id="spinBtn" onclick="spin()">Tourner la roue</button>
            <div id="timer"></div>
            <p id="result"></p>
        </div>
    </section>

    <section class="card">
        <h2>🎫 Créer un Ticket</h2>
        <input id="discord" placeholder="Pseudo Discord">
        <input id="minecraft" placeholder="Pseudo Minecraft">
        <textarea id="reason" placeholder="Votre demande..."></textarea>
        <button onclick="createTicket()">Envoyer le ticket</button>
    </section>
</div>

<div id="admin-view" class="view">
    <section class="card">
        <h2>🛠 Panel Admin</h2>
        <div id="tickets-list"></div>
        <button onclick="showView('user-view')">Retour</button>
    </section>
</div>

<script>
    const SPIN_COOLDOWN = 15 * 60 * 60 * 1000;

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function checkAdmin() {
        if (prompt("Code Admin :") === "7291") showView('admin-view');
    }

    let currentRotation = 0;

    function updateTimer() {
        const lastSpin = localStorage.getItem('lastSpin');
        const btn = document.getElementById("spinBtn");
        const timerTxt = document.getElementById("timer");
        if (lastSpin) {
            const timeLeft = SPIN_COOLDOWN - (Date.now() - parseInt(lastSpin));
            if (timeLeft > 0) {
                btn.disabled = true;
                const h = Math.floor(timeLeft / 3600000);
                const m = Math.floor((timeLeft % 3600000) / 60000);
                const s = Math.floor((timeLeft % 60000) / 1000);
                timerTxt.innerText = `Attente : ${h}h ${m}m ${s}s`;
                setTimeout(updateTimer, 1000);
                return;
            }
        }
        btn.disabled = false;
        timerTxt.innerText = "Prêt !";
    }

    function spin() {
        const chance = Math.random() * 100;
        let isWin = chance <= 10;
        let finalAngle = isWin ? (Math.random() > 0.5 ? 90 : 210) : 30; 
        currentRotation += 1800 + (360 - (currentRotation % 360)) + finalAngle;
        document.getElementById("wheel").style.transform = `rotate(${currentRotation}deg)`;
        localStorage.setItem('lastSpin', Date.now());
        setTimeout(() => {
            document.getElementById("result").innerHTML = isWin ? "<span style='color:#2ecc71'>🎉 GAGNÉ !</span>" : "<span style='color:#e74c3c'>❌ PERDU</span>";
            updateTimer();
        }, 4000);
    }

    let tickets = JSON.parse(localStorage.getItem('valdoria_tickets')) || [];
    function createTicket() {
        let d = document.getElementById("discord").value;
        let m = document.getElementById("minecraft").value;
        let r = document.getElementById("reason").value;
        if(!d || !m || !r) return alert("Remplis tout !");
        tickets.push({ d, m, r, date: new Date().toLocaleString() });
        localStorage.setItem('valdoria_tickets', JSON.stringify(tickets));
        alert("Ticket envoyé !");
        updateTicketsDisplay();
    }

    function updateTicketsDisplay() {
        let cont = document.getElementById("tickets-list");
        cont.innerHTML = "";
        tickets.forEach((t, i) => {
            cont.innerHTML += `<div style="border:1px solid yellow; padding:10px; margin-top:10px;">${t.m} : ${t.r} <button onclick="deleteTicket(${i})">X</button></div>`;
        });
    }

    function deleteTicket(i) {
        tickets.splice(i, 1);
        localStorage.setItem('valdoria_tickets', JSON.stringify(tickets));
        updateTicketsDisplay();
    }

    updateTimer();
    updateTicketsDisplay();
</script>
</body>
</html>
